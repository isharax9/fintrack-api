services:
  db:
    image: postgres:15-alpine
    container_name: fintrack_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fintrack_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fintrack_api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5001:5001"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:?Set POSTGRES_USER in .env}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:?Set POSTGRES_DB in .env}?schema=public
      - REDIS_URL=redis://redis:6379
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET:?Set ACCESS_TOKEN_SECRET in .env}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET:?Set REFRESH_TOKEN_SECRET in .env}
      - ACCESS_TOKEN_EXPIRES_IN=${ACCESS_TOKEN_EXPIRES_IN:-15m}
      - REFRESH_TOKEN_EXPIRES_IN=${REFRESH_TOKEN_EXPIRES_IN:-7d}
      - BCRYPT_SALT_ROUNDS=${BCRYPT_SALT_ROUNDS:-12}
      - SMTP_HOST=${SMTP_HOST:?Set SMTP_HOST in .env}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:?Set SMTP_USER in .env}
      - SMTP_PASS=${SMTP_PASS:?Set SMTP_PASS in .env}
      - EMAIL_FROM=${EMAIL_FROM:-FinTrack <noreply@fintrack.dev>}
      - APP_NAME=${APP_NAME:-FinTrack}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - PORT=${PORT:-5001}
    # Apply committed migrations before starting the API.
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm run start"
    volumes:
      - ./prisma:/app/prisma

volumes:
  postgres_data:
  redis_data:
