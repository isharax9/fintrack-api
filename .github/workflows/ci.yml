name: API CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  verify:
    name: Build, Test, Audit
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: fintrack_user
          POSTGRES_PASSWORD: fintrack_password
          POSTGRES_DB: fintrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fintrack_user -d fintrack_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://fintrack_user:fintrack_password@localhost:5432/fintrack_test?schema=public
      REDIS_URL: redis://localhost:6379
      ACCESS_TOKEN_SECRET: ci_access_secret
      REFRESH_TOKEN_SECRET: ci_refresh_secret
      ACCESS_TOKEN_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 7d
      BCRYPT_SALT_ROUNDS: 4
      RESEND_API_KEY: re_ci_placeholder_key
      EMAIL_FROM: FinTrack <ci@fintrack.dev>
      APP_NAME: FinTrack
      FRONTEND_URL: http://localhost:3000
      PORT: 5001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply Prisma migrations to a fresh database
        run: npx prisma migrate deploy

      - name: Verify API
        run: npm run ci:verify
